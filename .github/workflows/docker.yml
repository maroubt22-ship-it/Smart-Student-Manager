name: Docker Auto Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Cloner le repo
        uses: actions/checkout@v3
      
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smart-student-manager:latest .
      
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/smart-student-manager:latest
      
      - name: ✅ Succès - Image poussée vers Docker Hub
        run: echo "🎉 Image ${{ secrets.DOCKER_USERNAME }}/smart-student-manager:latest publiée avec succès!"
